<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mission : Make Senior Smile 🤍</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
color:#fff;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

.page{
text-align:center;
padding:25px;
max-width:380px;
animation:fade 1s;
}

.cat{
font-size:90px;
animation:bounce 2s infinite;
}

.meow{
font-size:22px;
margin-top:10px;
opacity:.8;
}

.hello{
font-size:34px;
margin-top:15px;
font-weight:bold;
}

.btn{
margin-top:35px;
padding:14px 38px;
border:none;
border-radius:30px;
font-size:18px;
font-weight:bold;
background:white;
color:black;
cursor:pointer;
}

.btn:hover{
transform:scale(1.05);
}

@keyframes bounce{
50%{
transform:translateY(-10px);
}
}

@keyframes fade{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}
</style>
</head>

<body>

<div class="page" id="page1">

<div class="cat">🐱</div>

<div class="meow">
Meow... 🐾
</div>

<div class="hello">
Hellooo Seniorrrr! 👋
</div>

<button class="btn" onclick="nextPage()">
OPEN 🤍
</button>

</div>

<script>

function nextPage(){

document.getElementById("page1").innerHTML=`

Welcome, Seniorrrr!
</h2>

<p style="margin-top:25px;
line-height:1.8;
font-size:20px;
color:#ddd;">

Indha website-ku
ore oru purpose dhaan... 🤍

<br><br>

Konjam neram
relax pannunga...

Enjoy the journey. ✨

</p>

<button class="btn" onclick="pageThree()">
Continue →
</button>

`;

}

function pageThree(){

// PART 2 starts here

}

</script>

</body>
</html>
