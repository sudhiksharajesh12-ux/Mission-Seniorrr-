<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mission : Make Senior Smile 🤍</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#000;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
color:white;
}

.container{
text-align:center;
animation:fade 1.5s ease;
}

.cat{
font-size:90px;
animation:walk 2s infinite ease-in-out;
}

.meow{
font-size:22px;
margin-top:10px;
opacity:0;
animation:show 1s forwards;
animation-delay:.5s;
}

.hello{
font-size:34px;
margin-top:15px;
font-weight:bold;
opacity:0;
animation:show 1s forwards;
animation-delay:1.8s;
}

button{
margin-top:35px;
padding:15px 45px;
font-size:18px;
border:none;
border-radius:40px;
background:white;
color:black;
cursor:pointer;
font-weight:bold;
opacity:0;
animation:show 1s forwards;
animation-delay:3s;
transition:.3s;
}

button:hover{
transform:scale(1.08);
}

@keyframes walk{
0%,100%{
transform:translateY(0);
}
50%{
transform:translateY(-10px);
}
}

@keyframes show{
to{
opacity:1;
}
}

@keyframes fade{
from{
opacity:0;
}
to{
opacity:1;
}
}
</style>

</head>

<body>

<div class="container">

<div class="cat">🐱</div>

<div class="meow">
Meow... 🐾
</div>

<div class="hello">
Hellooo Seniorrrr! 👋
</div>

<button onclick="openPage()">
OPEN 🤍
</button>

</div>

<script>
function openPage(){
window.location.href="page2.html";
}
</script>

</body>
</html>
