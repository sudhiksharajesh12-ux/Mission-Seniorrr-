<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Little Surprise 🤍</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#0f0f0f,#1f1f1f);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    color:#fff;
    overflow:hidden;
}

.container{
    text-align:center;
    padding:30px;
    animation:fadeIn 1.5s ease;
}

.envelope{
    font-size:90px;
    animation:float 3s ease-in-out infinite;
}

h1{
    margin-top:20px;
    font-size:32px;
}

p{
    margin-top:15px;
    color:#d9d9d9;
    line-height:1.8;
    font-size:18px;
}

button{
    margin-top:35px;
    padding:15px 35px;
    border:none;
    border-radius:50px;
    background:#fff;
    color:#111;
    font-size:17px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.08);
    box-shadow:0 0 20px rgba(255,255,255,.4);
}

@keyframes float{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-12px);
    }
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>
</head>

<body>

<div class="container">

<div class="envelope">📩</div>

<h1>A Tiny Letter</h1>

<p>
For someone...<br>
who probably doesn't know<br>
how special they are. 🤍
</p>

<button onclick="window.location.href='page2.html'">
Open Letter ✨
</button>

</div>

</body>
</html>
