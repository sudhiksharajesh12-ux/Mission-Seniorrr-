<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOAT's Man</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Poppins,sans-serif;
}

body{
    background:#0f0f0f;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:90%;
    max-width:420px;
    text-align:center;
}

img{
    width:100%;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(255,255,255,0.12);
    animation:fadeIn 1.2s ease;
}

.caption{
    margin-top:25px;
    font-size:30px;
    font-weight:700;
    color:#ffffff;
    animation:slideUp 1.4s ease;
}

.next-btn{
    display:inline-block;
    margin-top:35px;
    padding:14px 32px;
    background:#ffffff;
    color:#111;
    text-decoration:none;
    border-radius:50px;
    font-weight:bold;
    transition:0.3s;
}

.next-btn:hover{
    transform:scale(1.05);
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes slideUp{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>
</head>

<body>

<div class="container">

    <img src="1000065106.jpg" alt="Portugal Jersey">

    <div class="caption">
        GOAT's Man! 🫶🏻
    </div>

    <a href="page9.html" class="next-btn">
        Nextt uhh🤭
    </a>

</div>

</body>
</html>
