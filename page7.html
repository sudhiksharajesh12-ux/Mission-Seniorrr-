<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Red Moon 🌛</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Poppins,sans-serif;
}

body{
    background:#111;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    color:#fff;
}

.container{
    width:90%;
    max-width:420px;
    text-align:center;
}

img{
    width:100%;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(255,255,255,.15);
    animation:fadeIn 1.2s ease;
}

.caption{
    margin-top:25px;
    font-size:30px;
    font-weight:600;
    animation:slideUp 1.5s ease;
}

.next-btn{
    display:inline-block;
    margin-top:35px;
    padding:14px 30px;
    background:#fff;
    color:#111;
    text-decoration:none;
    border-radius:50px;
    font-weight:bold;
    transition:.3s;
}

.next-btn:hover{
    transform:scale(1.05);
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:scale(.95);
    }
    to{
        opacity:1;
        transform:scale(1);
    }
}

@keyframes slideUp{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>
</head>

<body>

<div class="container">

    <img src="IMG_20260710_131002.jpg" alt="Red Shirt">

    <div class="caption">
        Red moon!? 🌛🤌🏻
    </div>

    <a href="page8.html" class="next-btn">
        Next ➜
    </a>

</div>

</body>
</html>
