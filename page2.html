<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You 🤍</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Poppins,sans-serif;
}

body{
    background:#000;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

.container{
    text-align:center;
    animation:fadeIn 1.5s ease;
}

h1{
    font-size:38px;
    margin-bottom:20px;
}

p{
    font-size:24px;
    color:#ff8c8d;
    margin-bottom:50px;
}

button{
    padding:15px 45px;
    border:none;
    border-radius:30px;
    background:#ff4d88;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
    background:#ff2f75;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>

</head>

<body>

<audio id="bgMusic" preload="auto" loop>
    <source src="Innum-Konjam-Naeram-BG-Musiq.mp3" type="audio/mpeg">
</audio>

<div class="container">

<h1>Hey there!! 🌙🤍</h1>

<p>This one's for yuhhh! ❤️🫶</p>

<button id="continueBtn">Continue ✨</button>

</div>

<script>
const btn = document.getElementById("continueBtn");
const music = document.getElementById("bgMusic");

btn.addEventListener("click", async () => {
    btn.disabled = true;
    btn.innerHTML = "Playing... 🎵";

    try {
        await music.play();
    } catch (err) {
        alert("Music couldn't start 😭");
        console.log(err);
    }

    // Stay on this page for 30 seconds
    setTimeout(() => {
        window.location.href = "page3.html";
    }, 30000);
});
</script>

</body>
</html>
