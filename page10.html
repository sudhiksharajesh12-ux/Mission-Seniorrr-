<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mission Report 🫡</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#111;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    text-align:center;
    overflow:hidden;
}

.container{
    animation:fadeIn 1.8s ease;
    padding:20px;
    width:90%;
    max-width:450px;
}

h1{
    font-size:38px;
    margin-bottom:35px;
    color:#fff;
}

p{
    font-size:22px;
    line-height:2;
    color:#ddd;
}

.result{
    color:#c49a6c;
    font-weight:700;
}

.end{
    margin-top:45px;
    font-size:18px;
    color:#888;
    letter-spacing:2px;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>
</head>

<body>

<div class="container">

    <h1>Mission Report 🫡</h1>

    <p>
        <strong>Objective:</strong><br>
        Make Senior Smile.
        <br><br>

        <strong>Result:</strong><br>
        <span class="result">Smile detected? 😹🤎</span>
    </p>

    <div class="end">
        — End of Mission —
    </div>

</div>

</body>
</html>
